<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú - EL BATÁN</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styleeVistaCliente.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-batan sticky-top">
  <div class="container">
    <a class="navbar-brand" href="#">
      <i class="bi bi-cpu me-2"></i>EL BATÁN
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <span class="nav-link text-white fw-medium" id="userName">
            Bienvenido
          </span>
        </li>
        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm ms-3"
                  onclick="cerrarSesion()">
            <i class="bi bi-box-arrow-left me-1"></i>Salir
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="container">
    <h1 class="display-5 fw-bold">🍗 Nuestro Menú</h1>
    <p class="lead">Los mejores pollos a la brasa, frescos y deliciosos</p>
  </div>
</div>

<!-- Contenido -->
<div class="container py-4">

  <!-- Filtros de categoría -->
  <div class="category-filter d-flex flex-wrap justify-content-center gap-2 mb-5"
       id="categoryFilters">
    <button class="btn btn-sm active" data-cat="all">🍽️ Todos</button>
  </div>

  <!-- Grid de productos -->
  <div id="productsGrid" class="product-grid"></div>

  <!-- Estado vacío -->
  <div id="emptyProducts" class="empty-state py-5 d-none">
    <i class="bi bi-basket mb-3 d-block fs-1"></i>
    <h4 class="fw-bold">Pronto tendremos novedades</h4>
    <p class="text-muted">El administrador está preparando el menú 🍗</p>
  </div>

</div>

<!-- Carrito flotante -->
<div class="floating-cart shadow-lg" onclick="finalizarPedido()">
  <div class="position-relative">
    <i class="bi bi-cart3 fs-4"></i>
    <span class="position-absolute top-0 start-100 translate-middle
                 badge rounded-pill bg-danger" id="cartItems">0</span>
  </div>
  <span class="ms-2 d-none d-md-inline fw-bold">Ver Pedido</span>
</div>

<!-- Modal detalle producto -->
<div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close"
                data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center px-4 pb-4">
        <div class="mb-4">
          <img id="modalImg" src="" class="img-fluid rounded-4 shadow-sm"
               style="max-height:250px;width:100%;object-fit:cover"
               onerror="this.src='/Holding_Web/img/noimage.png'"/>
        </div>
        <h3 id="modalNombre" class="fw-bold mb-2"></h3>
        <span id="modalCategoria"
              class="badge bg-success px-3 py-2 mb-3 fs-6"></span>
        <p id="modalDescripcion" class="text-muted mb-4"></p>
        <div class="d-flex justify-content-between align-items-center
                    bg-light p-3 rounded-4">
          <span class="text-muted fw-medium">Precio unitario:</span>
          <h2 class="text-primary fw-bold mb-0" id="modalPrecio"></h2>
        </div>
      </div>
      <div class="modal-footer border-0 px-4 pb-4">
        <button class="btn btn-primary btn-lg w-100 rounded-3 py-3 fw-bold"
                onclick="agregarAlCarrito()">
          <i class="bi bi-cart-plus me-2"></i>Añadir a mi pedido
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/jscripVistaCliente.js"></script>

<!-- Función auxiliar de cerrar sesión accesible desde HTML -->
<script>
  function cerrarSesion() {
    fetch("/Holding_Web.SAC/api/logout").finally(() => {
      window.location.href = "/Holding_Web.SAC/";
    });
  }
</script>
</body>
</html>
