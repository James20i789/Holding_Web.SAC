<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Delivery - EL BATÁN</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="../css/delivery.css"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      🚚 Panel Delivery - EL BATÁN
    </span>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-light btn-sm"
              onclick="actualizarManual()">
        <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
      </button>
      <button class="btn btn-outline-danger btn-sm"
              onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">
      <i class="bi bi-receipt me-2 text-warning"></i>
      Pedidos Nuevos (EN PROCESO DE CONFIRMACIÓN)
    </h4>
    <span class="badge bg-warning text-dark fs-6" id="contadorPedidos">
      Cargando...
    </span>
  </div>

  <!-- Grid de pedidos -->
  <div id="listaPedidos" class="row g-3"></div>

  <!-- Estado vacío -->
  <div id="vacio" class="text-center text-muted mt-5 d-none py-5">
    <i class="bi bi-inbox fs-1 d-block mb-3 text-muted"></i>
    <h5>No hay pedidos pendientes</h5>
    <p class="small">Los nuevos pedidos aparecerán aquí automáticamente</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/delivery.js"></script>

<script>
  function cerrarSesion() {
    fetch("/Holding_Web.SAC/api/logout").finally(() => {
      window.location.href = "../pages/index_1.html";
    });
  }
</script>
</body>
</html>
