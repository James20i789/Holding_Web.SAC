<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro - EL BATÁN</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Holding_Web/css/style.css"/>
  <link rel="stylesheet" href="/Holding_Web/css/styleeFormularioRegistro.css"/>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5 col-xl-4">

        <div class="card register-card mt-4">
          <div class="card-header-custom">
            <a href="/Holding_Web/pages/index.html" class="company-logo">
              <img src="/Holding_Web/image/logo.jpeg" alt="EL BATÁN"
                   onerror="this.onerror=null;
                     this.parentElement.innerHTML='<i class=\'bi bi-cpu display-6\'></i>'"/>
            </a>
            <h1>EL BATÁN</h1>
            <p class="subtitle">Crear cuenta</p>
          </div>

          <div class="card-body">
            <div class="welcome-text">
              <h4>✨ Únete hoy</h4>
              <p class="text-muted mb-0">Completa tus datos para registrarte</p>
            </div>

            <form id="registerForm" novalidate>
              <div class="mb-2">
                <label class="form-label">
                  <i class="bi bi-person me-1"></i>Nombre completo
                </label>
                <input type="text" class="form-control" id="nombre"
                       placeholder="Ej: Juan Pérez" required minlength="3"/>
              </div>

              <div class="mb-2">
                <label class="form-label">
                  <i class="bi bi-envelope me-1"></i>Correo electrónico
                </label>
                <input type="email" class="form-control" id="correo"
                       placeholder="ejemplo@correo.com" required/>
              </div>

              <div class="mb-2">
                <label class="form-label">
                  <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <div class="input-group">
                  <input type="password" class="form-control" id="password"
                         placeholder="Mínimo 6 caracteres" required minlength="6"/>
                  <button class="btn btn-outline-secondary" type="button" id="togglePass">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-geo-alt me-1"></i>Dirección
                </label>
                <input type="text" class="form-control" id="direccion"
                       placeholder="Av. Principal #123, Santa Rosa de Cumbaza"
                       required minlength="10"/>
              </div>

              <button type="submit" class="btn btn-login w-100" id="btnRegister">
                <span class="btn-text">
                  <i class="bi bi-person-plus me-1"></i>Registrarme
                </span>
                <span class="btn-loader spinner-border spinner-border-sm d-none"></span>
              </button>
            </form>

            <p class="text-center mt-3 small login-link">
              ¿Ya tienes cuenta?
              <a href="/Holding_Web/pages/index.html">Inicia sesión aquí</a>
            </p>

            <span class="agreement">
              <a href="#">
                <i class="bi bi-heart-fill text-danger"></i>
                Gracias por tu preferencia 🙏
              </a>
            </span>
          </div>
        </div><!-- /card -->

        <p class="text-center text-muted mt-3 small">
          &copy; 2026 Restaurante-Pollería EL BATÁN
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/Holding_Web/js/jscripsFormularioRegistro.js"></script>
</body>
</html>
