<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Mozo - EL BATÁN</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="../css/mozo.css"/>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm mb-3">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">
      <i class="bi bi-person-badge me-2"></i>Panel de Mozo
    </span>
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <button class="btn btn-outline-light btn-sm rounded-pill px-3"
              onclick="location.reload()">
        <i class="bi bi-plus-lg me-1"></i>Nuevo Pedido
      </button>
      <button class="btn btn-outline-light btn-sm"
              onclick="verPedidos()">
        <i class="bi bi-receipt me-1"></i>Ver Pedidos
      </button>
      <select id="filtroServicio"
              class="form-select form-select-sm"
              style="max-width:160px">
        <option value="all">Todos los servicios</option>
        <option value="Mesa">En Mesa</option>
        <option value="Para Llevar">Para Llevar</option>
        <option value="Delivery">Delivery</option>
      </select>
      <button class="btn btn-outline-danger btn-sm"
              onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- Catálogo de productos -->
    <div class="col-md-7 col-lg-8">
      <div class="card mb-3 shadow-sm border-0 rounded-4">
        <div class="card-body">
          <div class="row g-2">
            <div class="col-8">
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-search"></i>
                </span>
                <input type="text" id="buscarProducto"
                       class="form-control border-start-0"
                       placeholder="Buscar plato o bebida..."/>
              </div>
            </div>
            <div class="col-4">
              <select id="filtroCategoria" class="form-select">
                <option value="all">Categorías</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3" id="listaProductos"></div>
    </div>

    <!-- Comanda -->
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-lg border-0 rounded-4 comanda-card">
        <div class="card-header bg-white py-3 fw-bold
                    d-flex justify-content-between align-items-center">
          <span>
            <i class="bi bi-receipt text-primary me-2"></i>Detalle del Pedido
          </span>
          <span class="badge bg-secondary rounded-pill" id="itemCount">
            0 items
          </span>
        </div>

        <div class="card-body p-0 overflow-auto" style="max-height:350px">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr class="small text-uppercase text-muted">
                <th class="ps-3">Producto</th>
                <th class="text-end pe-3">Subtotal</th>
              </tr>
            </thead>
            <tbody id="listaComanda"></tbody>
          </table>
        </div>

        <div class="card-footer bg-white border-top-0 p-4">
          <!-- Mesa / Servicio -->
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="small fw-bold text-muted mb-1">Mesa / Cliente</label>
              <input type="text" id="mesa" class="form-control"
                     placeholder="Ej: Mesa 3"/>
            </div>
            <div class="col-6">
              <label class="small fw-bold text-muted mb-1">Servicio</label>
              <select id="tipoPedido" class="form-select">
                <option value="Mesa">En Mesa</option>
                <option value="Para Llevar">Para Llevar</option>
                <option value="Delivery">Delivery</option>
              </select>
            </div>
          </div>

          <!-- Método de pago -->
          <div class="mb-3">
            <label class="small fw-bold text-muted mb-2 d-block">
              Método de Pago
            </label>
            <div class="d-flex gap-1">
              <input type="radio" class="btn-check" name="pago"
                     id="yape" value="Yape" checked/>
              <label class="btn btn-outline-primary btn-sm flex-fill rounded-3"
                     for="yape">Yape</label>

              <input type="radio" class="btn-check" name="pago"
                     id="plin" value="Plin"/>
              <label class="btn btn-outline-info btn-sm flex-fill rounded-3"
                     for="plin">Plin</label>

              <input type="radio" class="btn-check" name="pago"
                     id="efectivo" value="Efectivo"/>
              <label class="btn btn-outline-success btn-sm flex-fill rounded-3"
                     for="efectivo">Efectivo</label>

              <input type="radio" class="btn-check" name="pago"
                     id="tarjeta" value="Tarjeta"/>
              <label class="btn btn-outline-dark btn-sm flex-fill rounded-3"
                     for="tarjeta">Tarjeta</label>
            </div>
          </div>

          <!-- Notas -->
          <div class="mb-3">
            <textarea id="notas" class="form-control bg-light" rows="2"
                      placeholder="Ej: Sin cebolla, extra salsa..."></textarea>
          </div>

          <!-- Total -->
          <div class="d-flex justify-content-between align-items-center
                      mb-4 border-top pt-3">
            <h4 class="mb-0 fw-bold">TOTAL:</h4>
            <h4 class="mb-0 text-primary fw-bold" id="totalPedido">
              S/ 0.00
            </h4>
          </div>

          <!-- Botón registrar -->
          <button class="btn btn-primary w-100 btn-lg rounded-4 shadow-sm py-3"
                  onclick="finalizarPedido()">
            <i class="bi bi-check2-circle me-2"></i>REGISTRAR PEDIDO
          </button>
        </div>
      </div>
    </div>

  </div>
</div><!-- /container-fluid -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/Holding_Web/js/mozo.js"></script>

<script>
  function cerrarSesion() {
    fetch("/Holding_Web/").finally(() => {
      window.location.href = "/Holding_Web/";
    });
  }
</script>
</body>
</html>
